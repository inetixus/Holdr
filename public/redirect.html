<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to Holdr...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f7f8;
      color: #172122;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      max-width: 400px;
      width: 100%;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px;
      color: #0070BA;
    }
    p {
      font-size: 16px;
      color: #64716e;
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0070BA;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    .btn {
      display: none;
      background: #0070BA;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      margin-top: 10px;
      box-shadow: 0 4px 10px rgba(0, 112, 186, 0.2);
      transition: background 0.2s;
    }
    .btn:active {
      background: #005a96;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Connecting to Holdr</h1>
    <p>Please wait while we redirect you back to the mobile application...</p>
    <a id="fallback-btn" class="btn" href="#">Return to App</a>
  </div>
  <script>
    // Extract parameters from hash fragment
    const hash = window.location.hash;
    const hashParams = new URLSearchParams(hash.substring(1));
    
    // Extract query parameters
    const urlParams = new URLSearchParams(window.location.search);
    
    // Read state and error from either hash or query parameters
    const state = hashParams.get('state') || urlParams.get('state');
    const error = hashParams.get('error') || urlParams.get('error');
    
    if (state) {
      // Decode target redirect URI (e.g., exp://...)
      let redirectUrl = decodeURIComponent(state);
      
      // Append the OAuth token hash or error back to the app
      if (hash) {
        redirectUrl += (redirectUrl.includes('#') ? '&' : '#') + hash.substring(1);
      } else if (error) {
        redirectUrl += (redirectUrl.includes('?') ? '&' : '?') + 'error=' + encodeURIComponent(error);
      }
      
      // Configure manual return button in case automatic redirect is blocked
      const btn = document.getElementById('fallback-btn');
      btn.href = redirectUrl;
      btn.style.display = 'inline-block';
      
      // Attempt automatic redirect
      window.location.replace(redirectUrl);
    } else {
      document.querySelector('.card').innerHTML = '<h1>Authentication Error</h1><p style="color: #fb6e59;">Missing redirect state. Please return to the Holdr app and try again.</p>';
    }
  </script>
</body>
</html>
